events {}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  upstream cbmp_backend {
    server cbmp-appliance:8088;
    keepalive 32;
  }

  upstream cbmp_backend_canary {
    # Replace with cbmp-appliance-canary:8088 after deploying a canary appliance.
    server cbmp-appliance:8088;
    keepalive 16;
  }

  split_clients "$request_id" $cbmp_api_pool {
    0% cbmp_backend_canary;
    * cbmp_backend;
  }

  map $http_x_cbmp_drain $cbmp_drain_header {
    default "";
    "1" "true";
  }

  server {
    listen 80;
    server_name _;

    client_max_body_size 50m;
    root /usr/share/nginx/html;
    index index.html;

    location /api/events {
      proxy_pass http://$cbmp_api_pool;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      add_header X-CBMP-Drain $cbmp_drain_header always;
      proxy_buffering off;
      proxy_cache off;
    }

    location /api/ {
      proxy_pass http://$cbmp_api_pool;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      add_header X-CBMP-Drain $cbmp_drain_header always;
      proxy_read_timeout 120s;
    }

    location / {
      try_files $uri $uri/ /index.html;
    }
  }
}
