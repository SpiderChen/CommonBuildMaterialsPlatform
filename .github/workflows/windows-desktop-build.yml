name: Build ERP Desktop (Windows)

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows exe
    runs-on: windows-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend dependencies
        working-directory: ERP/frontend
        run: npm ci

      - name: Build Windows desktop app
        working-directory: ERP/frontend
        run: wails build -platform windows/amd64 -webview2 browser -o CommonBuildMaterialsPlatform.exe

      - name: Record build source revision
        run: |
          mkdir -p ERP/frontend/build/bin
          printf "commit=%s\n" "${GITHUB_SHA}" > ERP/frontend/build/bin/build-source.txt
          printf "ref=%s\n" "${GITHUB_REF}" >> ERP/frontend/build/bin/build-source.txt
          printf "runner=%s\n" "${GITHUB_RUN_ID}" >> ERP/frontend/build/bin/build-source.txt

      - name: Show built file size
        run: ls -lh ERP/frontend/build/bin/CommonBuildMaterialsPlatform.exe ERP/frontend/build/bin/build-source.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CommonBuildMaterialsPlatform-windows-${{ github.sha }}
          path: |
            ERP/frontend/build/bin/CommonBuildMaterialsPlatform.exe
            ERP/frontend/build/bin/build-source.txt
          if-no-files-found: error
