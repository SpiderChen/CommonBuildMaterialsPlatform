services:
  gateway:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: /api
    depends_on:
      - cbmp-appliance
    ports:
      - "8080:80"
    networks:
      - cbmp

  cbmp-appliance:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    environment:
      CBMP_ADDR: 0.0.0.0:8088
      CBMP_DATA: /data/app.vault
      CBMP_DATA_KEY: ${CBMP_DATA_KEY:-change-me-before-production}
      CBMP_BACKUP_DIR: /data/backups
      CBMP_ENFORCE_IP_WHITELIST: ${CBMP_ENFORCE_IP_WHITELIST:-0}
      CBMP_POSTGRES_DSN: postgres://cbmp:cbmp@postgres:5432/cbmp?sslmode=disable
      CBMP_REDIS_ADDR: redis:6379
      CBMP_RABBITMQ_URL: amqp://cbmp:cbmp@rabbitmq:5672/
      CBMP_MINIO_ENDPOINT: minio:9000
      CBMP_CLICKHOUSE_DSN: tcp://clickhouse:9000
      CBMP_CLICKHOUSE_HTTP_URL: http://clickhouse:8123
    volumes:
      - cbmp_data:/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_started
      clickhouse:
        condition: service_started
    networks:
      - cbmp

  industrial-control-gateway:
    profiles: ["iot"]
    build:
      context: ..
      dockerfile: industrial-control-gateway/Dockerfile
    environment:
      ICG_ADDR: 0.0.0.0:19101
      ICG_TCP_ADDR: ${ICG_TCP_ADDR:-0.0.0.0:19111}
      ICG_HTTP_TARGETS: ${ICG_HTTP_TARGETS:-}
      ICG_HTTP_BEARER_TOKEN: ${ICG_HTTP_BEARER_TOKEN:-}
      ICG_SHARED_SECRET: ${ICG_SHARED_SECRET:-}
      ICG_FORWARD_MODE: ${ICG_FORWARD_MODE:-protocol-frame}
      ICG_PROTOCOL: ${ICG_PROTOCOL:-plant-json}
      ICG_OUT_FILE: ${ICG_OUT_FILE:-/data/industrial-control.jsonl}
    ports:
      - "19101:19101"
      - "19111:19111"
    volumes:
      - iot_gateway_data:/data
    networks:
      - cbmp

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cbmp
      POSTGRES_USER: cbmp
      POSTGRES_PASSWORD: cbmp
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cbmp -d cbmp"]
      interval: 10s
      timeout: 5s
      retries: 8
    networks:
      - cbmp

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 8
    networks:
      - cbmp

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: cbmp
      RABBITMQ_DEFAULT_PASS: cbmp
    ports:
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 5s
      retries: 8
    networks:
      - cbmp

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: cbmpadmin
      MINIO_ROOT_PASSWORD: cbmpadmin123
    ports:
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - cbmp

  clickhouse:
    image: clickhouse/clickhouse-server:24.8-alpine
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    networks:
      - cbmp

volumes:
  cbmp_data:
  postgres_data:
  redis_data:
  rabbitmq_data:
  minio_data:
  clickhouse_data:
  iot_gateway_data:

networks:
  cbmp:
    driver: bridge
