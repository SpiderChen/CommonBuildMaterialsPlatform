services:
  gateway:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: /api
    depends_on:
      - cbmp-appliance
    ports:
      - "8080:80"
    networks:
      - cbmp

  cbmp-appliance:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    environment:
      CBMP_ADDR: 0.0.0.0:8088
      CBMP_DATA: /data/app.vault
      CBMP_DATA_KEY: ${CBMP_DATA_KEY:?set CBMP_DATA_KEY in ERP/deploy/.env}
      CBMP_INITIAL_ADMIN_PASSWORD: ${CBMP_INITIAL_ADMIN_PASSWORD:?set CBMP_INITIAL_ADMIN_PASSWORD in ERP/deploy/.env}
      CBMP_PUBLIC_BASE_URL: ${CBMP_PUBLIC_BASE_URL:-http://localhost:8080}
      CBMP_BACKUP_DIR: /data/backups
      CBMP_BACKUP_KEY: ${CBMP_BACKUP_KEY:-}
      CBMP_ENFORCE_IP_WHITELIST: ${CBMP_ENFORCE_IP_WHITELIST:-0}
      CBMP_POSTGRES_DSN: ${CBMP_POSTGRES_DSN:?set CBMP_POSTGRES_DSN in ERP/deploy/.env}
      CBMP_POSTGRES_LOAD_FROM_DOMAIN: ${CBMP_POSTGRES_LOAD_FROM_DOMAIN:-0}
      CBMP_REDIS_ADDR: ${CBMP_REDIS_ADDR:-redis:6379}
      CBMP_RABBITMQ_URL: ${CBMP_RABBITMQ_URL:-}
      CBMP_CLICKHOUSE_HTTP_URL: ${CBMP_CLICKHOUSE_HTTP_URL:-http://clickhouse:8123}
      CBMP_UPDATE_SIGNING_SECRET: ${CBMP_UPDATE_SIGNING_SECRET:-}
      CBMP_COLLECTION_CALLBACK_SECRET: ${CBMP_COLLECTION_CALLBACK_SECRET:-}
      CBMP_TAX_GATEWAY_URL: ${CBMP_TAX_GATEWAY_URL:-}
      CBMP_TAX_GATEWAY_PROVIDER: ${CBMP_TAX_GATEWAY_PROVIDER:-}
      CBMP_TAX_GATEWAY_TOKEN: ${CBMP_TAX_GATEWAY_TOKEN:-}
      CBMP_TAX_GATEWAY_SECRET: ${CBMP_TAX_GATEWAY_SECRET:-}
      CBMP_MAP_PROVIDER: ${CBMP_MAP_PROVIDER:-}
      CBMP_MAP_TILE_URL: ${CBMP_MAP_TILE_URL:-}
      CBMP_MAP_API_KEY: ${CBMP_MAP_API_KEY:-}
    volumes:
      - cbmp_data:/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_started
      clickhouse:
        condition: service_started
    networks:
      - cbmp

  industrial-control-gateway:
    profiles: ["iot"]
    build:
      context: ..
      dockerfile: industrial-control-gateway/Dockerfile
    environment:
      ICG_ADDR: 0.0.0.0:19101
      ICG_TCP_ADDR: ${ICG_TCP_ADDR:-0.0.0.0:19111}
      ICG_HTTP_TARGETS: ${ICG_HTTP_TARGETS:-}
      ICG_HTTP_BEARER_TOKEN: ${ICG_HTTP_BEARER_TOKEN:-}
      ICG_SHARED_SECRET: ${ICG_SHARED_SECRET:-}
      ICG_FORWARD_MODE: ${ICG_FORWARD_MODE:-protocol-frame}
      ICG_PROTOCOL: ${ICG_PROTOCOL:-plant-json}
      ICG_OUT_FILE: ${ICG_OUT_FILE:-/data/industrial-control.jsonl}
    ports:
      - "19101:19101"
      - "19111:19111"
    volumes:
      - iot_gateway_data:/data
    networks:
      - cbmp

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?set POSTGRES_DB in ERP/deploy/.env}
      POSTGRES_USER: ${POSTGRES_USER:?set POSTGRES_USER in ERP/deploy/.env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in ERP/deploy/.env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cbmp -d cbmp"]
      interval: 10s
      timeout: 5s
      retries: 8
    networks:
      - cbmp

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 8
    networks:
      - cbmp

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-cbmp}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:?set RABBITMQ_DEFAULT_PASS in ERP/deploy/.env}
    ports:
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 5s
      retries: 8
    networks:
      - cbmp

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-cbmpadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD in ERP/deploy/.env}
    ports:
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - cbmp

  clickhouse:
    image: clickhouse/clickhouse-server:24.8-alpine
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    networks:
      - cbmp

volumes:
  cbmp_data:
  postgres_data:
  redis_data:
  rabbitmq_data:
  minio_data:
  clickhouse_data:
  iot_gateway_data:

networks:
  cbmp:
    driver: bridge
