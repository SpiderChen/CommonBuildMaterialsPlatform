<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">Common Build Materials Platform icon</title>
  <desc id="desc">A cyan and green building materials ERP mark with stacked blocks and CBM lettering.</desc>
  <defs>
    <linearGradient id="bg" x1="164" y1="130" x2="860" y2="900" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#08172a"/>
      <stop offset=".54" stop-color="#06111f"/>
      <stop offset="1" stop-color="#0b2530"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="43%" r="50%">
      <stop offset="0" stop-color="#20f6ff" stop-opacity=".36"/>
      <stop offset=".58" stop-color="#20f6ff" stop-opacity=".08"/>
      <stop offset="1" stop-color="#20f6ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="topFace" x1="360" y1="250" x2="680" y2="432" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#e9feff"/>
      <stop offset=".52" stop-color="#74fff0"/>
      <stop offset="1" stop-color="#20f6ff"/>
    </linearGradient>
    <linearGradient id="leftFace" x1="330" y1="338" x2="500" y2="650" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2077bb"/>
      <stop offset="1" stop-color="#123456"/>
    </linearGradient>
    <linearGradient id="rightFace" x1="520" y1="412" x2="760" y2="574" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#20f6ff"/>
      <stop offset="1" stop-color="#1aa06b"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="22" stdDeviation="20" flood-color="#000814" flood-opacity=".42"/>
    </filter>
    <clipPath id="shellClip">
      <rect x="72" y="72" width="880" height="880" rx="190"/>
    </clipPath>
  </defs>

  <rect x="72" y="72" width="880" height="880" rx="190" fill="url(#bg)"/>
  <g clip-path="url(#shellClip)" opacity=".36">
    <path d="M110 252h804M110 372h804M110 492h804M110 612h804M110 732h804" stroke="#20f6ff" stroke-width="2" opacity=".22"/>
    <path d="M246 110v804M386 110v804M526 110v804M666 110v804M806 110v804" stroke="#7dffb2" stroke-width="2" opacity=".12"/>
    <circle cx="502" cy="432" r="360" fill="url(#halo)"/>
  </g>
  <rect x="78" y="78" width="868" height="868" rx="184" fill="none" stroke="#20f6ff" stroke-width="10" opacity=".46"/>
  <rect x="96" y="96" width="832" height="832" rx="166" fill="none" stroke="#7dffb2" stroke-width="2" opacity=".22"/>

  <g filter="url(#softShadow)">
    <path d="M326 334 552 250 736 348 504 432Z" fill="url(#topFace)"/>
    <path d="M326 334 504 432 504 660 326 556Z" fill="url(#leftFace)"/>
    <path d="M504 432 736 348 736 570 504 660Z" fill="url(#rightFace)"/>
    <path d="M326 334 552 250 736 348 504 432Z" fill="none" stroke="#efffff" stroke-width="10" stroke-linejoin="round" opacity=".82"/>
    <path d="M326 334 504 432 736 348M504 432v228M326 556l178 104 232-90" fill="none" stroke="#d9ffff" stroke-width="8" stroke-linejoin="round" opacity=".54"/>
    <path d="M374 396 504 472 684 406M374 466l130 76 184-70M374 536l130 76 184-70" fill="none" stroke="#efffff" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" opacity=".68"/>
    <path d="M408 312h182" stroke="#10243d" stroke-width="22" stroke-linecap="round" opacity=".24"/>
  </g>

  <g aria-hidden="true">
    <path d="M274 755h476" stroke="#20f6ff" stroke-width="5" stroke-linecap="round" opacity=".36"/>
    <text x="512" y="838" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="118" font-weight="800" letter-spacing="10" fill="#f2feff">CBM</text>
    <text x="512" y="838" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="118" font-weight="800" letter-spacing="10" fill="none" stroke="#20f6ff" stroke-width="2" opacity=".42">CBM</text>
  </g>
</svg>
