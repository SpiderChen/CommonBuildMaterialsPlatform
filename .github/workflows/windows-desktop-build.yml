name: Build ERP Desktop (Windows)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows exe
    runs-on: windows-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Wails CLI
        shell: bash
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend dependencies
        shell: bash
        working-directory: ERP/frontend
        run: npm ci

      - name: Build Windows desktop app
        shell: bash
        working-directory: ERP/frontend
        run: |
          wails build -platform windows/amd64 -webview2 browser -o CommonBuildMaterialsPlatform.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CommonBuildMaterialsPlatform-windows-exe
          path: ERP/frontend/build/bin/CommonBuildMaterialsPlatform.exe
          if-no-files-found: error
